# ROS2 parameter file for FAST-LIVO2
# Odin1 de-distorted pinhole camera intrinsics
# Device-specific: replace with values from your odin driver calib.yaml
# fx=A11, fy=A22, cx=u0, cy=v0; distortion=0 (already de-distorted)
laserMapping:
  ros__parameters:
    # cam_model
    cam_model: "Pinhole"

    # cam_width
    cam_width: 1600

    # cam_height
    cam_height: 1296

    # scale
    scale: 0.5

    # cam_fx (= A11 from calib.yaml)
    cam_fx: 733.347088

    # cam_fy (= A22 from calib.yaml)
    cam_fy: 733.6527

    # cam_cx (= u0 from calib.yaml)
    cam_cx: 768.670454

    # cam_cy (= v0 from calib.yaml)
    cam_cy: 624.177971

    # distortion = 0 (undistorted image)
    cam_d0: 0.0

    # cam_d1
    cam_d1: 0.0

    # cam_d2
    cam_d2: 0.0

    # cam_d3
    cam_d3: 0.0
